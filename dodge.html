<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; color: #eee; }
canvas { border: 2px solid #e94560; border-radius: 4px; cursor: none; }
#ui { text-align: center; margin-top: 20px; }
#score { font-size: 24px; color: #e94560; }
#highscore { font-size: 14px; color: #888; margin-top: 5px; }
#start-screen { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#start-screen h1 { font-size: 36px; color: #e94560; margin-bottom: 10px; }
#start-screen p { color: #aaa; margin-bottom: 20px; }
#start-screen button { background: #e94560; color: white; border: none; padding: 12px 30px; font-size: 18px; font-family: inherit; cursor: pointer; border-radius: 4px; }
#start-screen button:hover { background: #c73652; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="start-screen">
<h1>⚡ DODGE</h1>
<p>Move your mouse to avoid the red squares.<br>Survive as long as you can.</p>
<button onclick="startGame()">PLAY</button>
</div>
<canvas id="game"></canvas>
<div id="ui">
<div id="score">0</div>
<div id="highscore">Best: 0</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const startScreen = document.getElementById('start-screen');

const W = canvas.width = 600;
const H = canvas.height = 400;

let player, enemies, score, highscore, running, mouseX, mouseY, spawnTimer, difficulty;

highscore = parseInt(localStorage.getItem('dodgeHigh') || '0');
highscoreEl.textContent = `Best: ${highscore}`;

function startGame() {
  startScreen.classList.add('hidden');
  player = { x: W/2, y: H/2, size: 12, speed: 5 };
  enemies = [];
  score = 0;
  spawnTimer = 0;
  difficulty = 1;
  mouseX = W/2;
  mouseY = H/2;
  running = true;
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  mouseY = e.touches[0].clientY - rect.top;
}, { passive: false });

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const speed = 1.5 + Math.random() * difficulty * 0.8;
  
  if (side === 0) { x = Math.random() * W; y = -20; }
  else if (side === 1) { x = W + 20; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 20; }
  else { x = -20; y = Math.random() * H; }
  
  const angle = Math.atan2(player.y - y, player.x - x);
  vx = Math.cos(angle) * speed;
  vy = Math.sin(angle) * speed;
  
  enemies.push({ x, y, vx, vy, size: 14 + Math.random() * 10 });
}

function loop() {
  if (!running) return;
  
  // Move player toward mouse
  const dx = mouseX - player.x;
  const dy = mouseY - player.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 2) {
    player.x += (dx / dist) * Math.min(dist, player.speed);
    player.y += (dy / dist) * Math.min(dist, player.speed);
  }
  
  // Spawn enemies
  spawnTimer++;
  if (spawnTimer > Math.max(20, 60 - difficulty * 3)) {
    spawnEnemy();
    spawnTimer = 0;
  }
  
  // Update enemies
  for (let e of enemies) {
    e.x += e.vx;
    e.y += e.vy;
  }
  
  // Remove off-screen enemies
  enemies = enemies.filter(e => 
    e.x > -50 && e.x < W + 50 && e.y > -50 && e.y < H + 50
  );
  
  // Check collision
  for (let e of enemies) {
    const d = Math.sqrt((player.x - e.x)**2 + (player.y - e.y)**2);
    if (d < player.size + e.size/2) {
      running = false;
      if (score > highscore) {
        highscore = score;
        localStorage.setItem('dodgeHigh', highscore);
        highscoreEl.textContent = `Best: ${highscore}`;
      }
      startScreen.classList.remove('hidden');
      startScreen.querySelector('p').innerHTML = `You survived <strong>${score}</strong> seconds.<br>Move your mouse to avoid the red squares.`;
      return;
    }
  }
  
  // Draw
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  
  // Grid lines
  ctx.strokeStyle = '#252545';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
  for (let i = 0; i < H; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }
  
  // Enemies
  for (let e of enemies) {
    ctx.fillStyle = '#e94560';
    ctx.fillRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
    ctx.strokeStyle = '#ff6b81';
    ctx.lineWidth = 1;
    ctx.strokeRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
  }
  
  // Player
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fillStyle = '#0f3460';
  ctx.fill();
  ctx.strokeStyle = '#16c79a';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Player glow
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size + 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(22, 199, 154, 0.3)';
  ctx.lineWidth = 3;
  ctx.stroke();
  
  // Score (based on time)
  score = Math.floor((Date.now() - startTime) / 1000);
  scoreEl.textContent = score;
  
  // Difficulty ramps
  difficulty = 1 + score * 0.05;
  
  requestAnimationFrame(loop);
}

let startTime;
const origStart = startGame;
startGame = function() {
  startTime = Date.now();
  origStart();
};
</script>
</body>
</html>
