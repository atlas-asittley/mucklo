<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MUCKLO RPG — The Psych-Rock Quest</title>
  <style>
    :root {
      --black:  #050507;
      --deep:   #0a0a12;
      --dark:   #0e0d18;
      --purple: #1a5c2e;
      --violet: #2ca55e;
      --neon:   #39ff14;
      --neon2:  #ff3cac;
      --cyan:   #00e5ff;
      --gold:   #f7c948;
      --text:   #ccc8dd;
      --muted:  #7b7a8e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.3;
    }
    #game-container {
      width: 800px; height: 600px;
      background: var(--deep);
      border: 1px solid rgba(57,255,20,0.2);
      box-shadow: 0 0 40px rgba(57,255,20,0.08), 0 0 80px rgba(57,255,20,0.04);
      position: relative; overflow: hidden;
    }
    canvas { display: block; }
    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
    }
    .screen.active { display: flex; }

    /* ── TITLE SCREEN ── */
    #title-screen {
      background: var(--deep);
      gap: 0;
    }
    .title-scan {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
    }
    .title-logo {
      font-size: 5rem;
      font-weight: bold;
      letter-spacing: 0.4em;
      color: var(--neon);
      text-shadow: 0 0 20px rgba(57,255,20,0.9), 0 0 60px rgba(57,255,20,0.4);
      animation: flicker 4s infinite;
      margin-bottom: 0.2rem;
    }
    .title-sub {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .title-art {
      margin-bottom: 2.5rem;
    }
    .press-start {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: var(--neon);
      animation: blink 1.2s step-end infinite;
      cursor: pointer;
      text-transform: uppercase;
    }
    .title-footer {
      position: absolute; bottom: 1.2rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      opacity: 0.5;
    }
    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
      98% { opacity: 0.3; }
      99% { opacity: 1; }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 10px rgba(57,255,20,0.4); } 50% { box-shadow: 0 0 25px rgba(57,255,20,0.8); } }

    /* ── CHARACTER SELECT ── */
    #char-screen {
      background: var(--deep);
      padding: 2rem;
      gap: 1.5rem;
    }
    .screen-title {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--neon);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(57,255,20,0.6);
    }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      width: 100%;
    }
    .char-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(57,255,20,0.15);
      border-radius: 2px;
      padding: 1rem 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
    }
    .char-card:hover, .char-card.selected {
      background: rgba(57,255,20,0.06);
      border-color: var(--neon);
      box-shadow: 0 0 15px rgba(57,255,20,0.2);
    }
    .char-card.selected { animation: pulse 1.5s infinite; }
    .char-sprite-wrap { width: 48px; height: 48px; }
    .char-name {
      font-size: 0.7rem;
      color: var(--neon);
      letter-spacing: 0.1em;
      font-weight: bold;
    }
    .char-role {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.4;
    }
    .char-type {
      font-size: 0.6rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .char-stats {
      width: 100%;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .stat-bar-row {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.5rem;
      color: var(--muted);
    }
    .stat-bar-row span:first-child { width: 1.8rem; text-align: right; letter-spacing: 0.05em; }
    .stat-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .stat-fill { height: 100%; border-radius: 2px; }
    .char-desc {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(57,255,20,0.1);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      font-size: 0.6rem;
      color: var(--text);
      line-height: 1.6;
      letter-spacing: 0.05em;
      text-align: center;
      min-height: 3rem;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.6rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(57,255,20,0.1); box-shadow: 0 0 15px rgba(57,255,20,0.3); }
    .btn:disabled { opacity: 0.3; cursor: default; }

    /* ── OVERWORLD ── */
    #world-screen { background: var(--black); padding: 0; }
    #world-canvas { display: block; }

    /* ── BATTLE SCREEN ── */
    #battle-screen {
      background: var(--black);
      padding: 0;
      flex-direction: column;
    }
    #battle-canvas { display: block; }

    /* ── DIALOG OVERLAY ── */
    #dialog-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(5,5,7,0.96);
      border-top: 1px solid rgba(57,255,20,0.3);
      padding: 1rem 1.5rem;
      display: none;
      z-index: 100;
    }
    #dialog-box.active { display: block; }
    #dialog-speaker {
      font-size: 0.6rem;
      color: var(--neon);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    #dialog-text {
      font-size: 0.7rem;
      color: var(--text);
      line-height: 1.6;
      letter-spacing: 0.05em;
    }
    #dialog-continue {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 0.5rem;
      animation: blink 1s step-end infinite;
    }

    /* ── WIN/LOSE ── */
    #end-screen {
      background: var(--deep);
      gap: 1.5rem;
      text-align: center;
    }
    .end-title {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 0.3em;
    }
    .end-title.win { color: var(--neon); text-shadow: 0 0 30px rgba(57,255,20,0.8); }
    .end-title.lose { color: var(--neon2); text-shadow: 0 0 30px rgba(255,60,172,0.8); }
    .end-msg { font-size: 0.75rem; color: var(--text); letter-spacing: 0.1em; line-height: 1.8; max-width: 500px; }
    .end-stats { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }

    /* ── MOBILE / TOUCH CONTROLS ── */
    #touch-dpad {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      z-index: 101;
    }
    .dpad-row-mid {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .dpad-btn {
      width: 58px; height: 58px;
      background: rgba(5,5,7,0.82);
      border: 1px solid rgba(57,255,20,0.35);
      color: var(--neon);
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-center {
      width: 58px; height: 58px;
      background: rgba(5,5,7,0.4);
      border: 1px solid rgba(57,255,20,0.08);
      border-radius: 3px;
    }
    #btn-action {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 76px; height: 76px;
      background: rgba(5,5,7,0.82);
      border: 1px solid rgba(0,229,255,0.35);
      color: var(--cyan);
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 101;
    }
    .dpad-btn:active { background: rgba(57,255,20,0.14); border-color: var(--neon); }
    #btn-action:active { background: rgba(0,229,255,0.14); border-color: var(--cyan); }
    #battle-skill-btns {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 132px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
      background: rgba(5,5,7,0.94);
      border-top: 1px solid rgba(57,255,20,0.2);
      z-index: 50;
    }
    .bskill-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(57,255,20,0.15);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      text-align: left;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      display: flex; flex-direction: column; gap: 2px;
      overflow: hidden;
    }
    .bskill-btn:active { background: rgba(57,255,20,0.08); border-color: var(--neon); }
    .bskill-btn:disabled { opacity: 0.35; cursor: default; }
    .bskill-name { font-weight: bold; color: var(--text); font-size: 0.7rem; }
    .bskill-meta { font-size: 0.55rem; }
    .bskill-desc { color: var(--muted); font-size: 0.55rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media (hover: none), (max-width: 860px) {
      #touch-dpad, #btn-action { display: flex; }
      #battle-skill-btns { display: grid; }
      .char-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .btn { min-height: 44px; font-size: 0.8rem; }
    }
    #dialog-box { cursor: pointer; }
  </style>
</head>
<body>
<div id="game-container">

  <!-- TITLE SCREEN -->
  <div id="title-screen" class="screen active">
    <div class="title-scan"></div>
    <canvas id="title-canvas" width="800" height="600" style="position:absolute;inset:0;pointer-events:none;"></canvas>
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;">
      <div class="title-logo">MUCKLO</div>
      <div class="title-sub">The Psych-Rock Quest</div>
      <div class="title-art">
        <canvas id="title-art-canvas" width="300" height="120"></canvas>
      </div>
      <div class="press-start" id="press-start" onclick="Game.startCharSelect()">[ Press Enter to Begin ]</div>
    </div>
    <div class="title-footer">Midwest Psych-Rock RPG &nbsp;·&nbsp; v1.0 &nbsp;·&nbsp; Arrow Keys + Enter &nbsp;·&nbsp; Touch D-pad on mobile</div>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-screen" class="screen">
    <div class="screen-title">&gt; Select Your Bandmate &lt;</div>
    <div class="char-grid" id="char-grid"></div>
    <div class="char-desc" id="char-desc">Tap a bandmate to select.</div>
    <button class="btn" id="start-quest-btn" onclick="Game.startWorld()" disabled>[ Begin the Quest ]</button>
  </div>

  <!-- OVERWORLD -->
  <div id="world-screen" class="screen">
    <canvas id="world-canvas" width="800" height="600"></canvas>
    <div id="dialog-box">
      <div id="dialog-speaker"></div>
      <div id="dialog-text"></div>
      <div id="dialog-continue">&gt; Tap here or press Enter to continue</div>
    </div>
    <!-- Touch D-pad (mobile) -->
    <div id="touch-dpad">
      <button class="dpad-btn" id="btn-up" data-key="ArrowUp">▲</button>
      <div class="dpad-row-mid">
        <button class="dpad-btn" id="btn-left" data-key="ArrowLeft">◀</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="btn-right" data-key="ArrowRight">▶</button>
      </div>
      <button class="dpad-btn" id="btn-down" data-key="ArrowDown">▼</button>
    </div>
    <button id="btn-action">✦<br><small style="font-size:0.38rem;letter-spacing:0.06em">ACT</small></button>
  </div>

  <!-- BATTLE SCREEN -->
  <div id="battle-screen" class="screen">
    <canvas id="battle-canvas" width="800" height="600"></canvas>
    <!-- Battle skill buttons (mobile touch) -->
    <div id="battle-skill-btns">
      <button class="bskill-btn" id="bskill-0"></button>
      <button class="bskill-btn" id="bskill-1"></button>
      <button class="bskill-btn" id="bskill-2"></button>
      <button class="bskill-btn" id="bskill-3"></button>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" class="screen">
    <div class="end-title" id="end-title"></div>
    <div class="end-msg" id="end-msg"></div>
    <div class="end-stats" id="end-stats"></div>
    <button class="btn" onclick="Game.restart()">[ Play Again ]</button>
    <a href="/mucklo/" class="btn" style="text-decoration:none;display:inline-block;text-align:center;">[ Back to MUCKLO.com ]</a>
  </div>

</div>
<script src="game.js"></script>
</body>
</html>
