<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Extractor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
a.back { color: #555; font-size: 13px; text-decoration: none; align-self: flex-start; margin-bottom: 24px; }
a.back:hover { color: #16c79a; }
h1 { font-size: 36px; color: #16c79a; margin-bottom: 8px; }
.subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }
.container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; }
textarea {
  width: 100%;
  height: 180px;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #eee;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 12px;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
textarea:focus { border-color: #16c79a; }
.text-areas {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 600px) {
  .text-areas { grid-template-columns: 1fr; }
}
.row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.input-group { display: flex; flex-direction: column; }
input[type="number"] {
  width: 120px;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #eee;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="number"]:focus { border-color: #16c79a; }
select {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #eee;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
select:focus { border-color: #16c79a; }
button {
  background: #16c79a;
  color: #1a1a2e;
  border: none;
  border-radius: 6px;
  padding: 10px 28px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}
button:hover { opacity: 0.85; }
.result-box {
  display: none;
}
.result-box.visible { display: block; }
.output {
  width: 100%;
  height: 120px;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #e94560;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  padding: 12px;
  resize: vertical;
  outline: none;
  line-height: 1.6;
  transition: border-color 0.2s;
}
.output:focus { border-color: #16c79a; }
.error {
  color: #e94560;
  font-size: 13px;
  min-height: 18px;
}
.word-count { color: #555; font-size: 12px; margin-top: 4px; }
.section-divider {
  border: none;
  border-top: 1px solid #0f3460;
}
</style>
</head>
<body>
<a class="back" href="../">&larr; Back</a>
<h1>Word Extractor</h1>
<p class="subtitle">Combine two texts, then extract every Nth word</p>

<div class="container">
  <div class="text-areas">
    <div>
      <label for="text-a">Text A</label>
      <textarea id="text-a" placeholder="The quick brown fox..."></textarea>
      <div class="word-count" id="word-count-a"></div>
    </div>
    <div>
      <label for="text-b">Text B</label>
      <textarea id="text-b" placeholder="a lazy dog jumps..."></textarea>
      <div class="word-count" id="word-count-b"></div>
    </div>
  </div>

  <div class="row">
    <div class="input-group">
      <label for="combine-mode">Combine mode</label>
      <select id="combine-mode">
        <option value="alternate">Alternate words (A, B, A, B...)</option>
        <option value="a-then-b">A then B</option>
        <option value="b-then-a">B then A</option>
      </select>
    </div>
  </div>

  <hr class="section-divider">

  <div class="row">
    <div class="input-group">
      <label for="n-input">Every Nth word (X)</label>
      <input type="number" id="n-input" value="3" min="1" placeholder="3">
    </div>
    <button onclick="extract()">Extract</button>
  </div>

  <div class="error" id="error"></div>

  <div class="result-box" id="result-box">
    <label>Result</label>
    <textarea class="output" id="output"></textarea>
  </div>
</div>

<script>
const textA = document.getElementById('text-a');
const textB = document.getElementById('text-b');
const nInput = document.getElementById('n-input');
const combineMode = document.getElementById('combine-mode');
const resultBox = document.getElementById('result-box');
const outputEl = document.getElementById('output');
const errorEl = document.getElementById('error');

function getWords(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0);
}

function updateCount(textarea, countEl) {
  const words = getWords(textarea.value);
  countEl.textContent = words.length > 0 ? `${words.length} word${words.length !== 1 ? 's' : ''}` : '';
}

textA.addEventListener('input', () => {
  updateCount(textA, document.getElementById('word-count-a'));
  errorEl.textContent = '';
});

textB.addEventListener('input', () => {
  updateCount(textB, document.getElementById('word-count-b'));
  errorEl.textContent = '';
});

function combine(wordsA, wordsB, mode) {
  if (mode === 'a-then-b') return [...wordsA, ...wordsB];
  if (mode === 'b-then-a') return [...wordsB, ...wordsA];
  // alternate
  const result = [];
  const len = Math.max(wordsA.length, wordsB.length);
  for (let i = 0; i < len; i++) {
    if (i < wordsA.length) result.push(wordsA[i]);
    if (i < wordsB.length) result.push(wordsB[i]);
  }
  return result;
}

function extract() {
  errorEl.textContent = '';
  resultBox.classList.remove('visible');

  const a = textA.value.trim();
  const b = textB.value.trim();
  const x = parseInt(nInput.value, 10);

  if (!a && !b) {
    errorEl.textContent = 'Please enter text in at least one field.';
    return;
  }

  if (!x || x < 1) {
    errorEl.textContent = 'X must be at least 1.';
    return;
  }

  const wordsA = getWords(a);
  const wordsB = getWords(b);
  const words = combine(wordsA, wordsB, combineMode.value);

  if (x > words.length) {
    errorEl.textContent = `X (${x}) is larger than the combined word count (${words.length}). No words extracted.`;
    return;
  }

  const extracted = [];
  for (let i = x; i <= words.length; i += x) {
    extracted.push(words[i - 1]);
  }

  outputEl.value = extracted.join(' ');
  resultBox.classList.add('visible');
}

nInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') extract();
});
</script>
</body>
</html>
