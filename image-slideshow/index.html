<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slideshow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d1a;
  color: #eee;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

header a {
  color: #16c79a;
  text-decoration: none;
  font-size: 13px;
}

header a:hover { text-decoration: underline; }

h1 {
  font-size: 20px;
  color: #16c79a;
  flex-shrink: 0;
}

.search-bar {
  display: flex;
  gap: 8px;
  flex: 1;
  min-width: 200px;
}

.search-bar input {
  flex: 1;
  background: #0d0d1a;
  border: 1px solid #0f3460;
  border-radius: 4px;
  padding: 8px 12px;
  color: #eee;
  font-family: inherit;
  font-size: 14px;
  outline: none;
}

.search-bar input:focus { border-color: #16c79a; }

.search-bar button {
  background: #16c79a;
  border: none;
  border-radius: 4px;
  padding: 8px 16px;
  color: #0d0d1a;
  font-family: inherit;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  white-space: nowrap;
}

.search-bar button:hover { background: #13a882; }

.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  font-size: 13px;
  color: #888;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 42px;
}

.counter { color: #16c79a; font-weight: bold; }

.auto-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}

.auto-toggle input[type="checkbox"] { cursor: pointer; accent-color: #16c79a; }

.slideshow-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 20px;
  min-height: 400px;
}

.placeholder {
  text-align: center;
  color: #444;
}

.placeholder svg { margin-bottom: 16px; opacity: 0.4; }
.placeholder p { font-size: 15px; }

.loading {
  display: none;
  text-align: center;
  color: #16c79a;
}

.loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #0f3460;
  border-top-color: #16c79a;
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error {
  display: none;
  text-align: center;
  color: #e94560;
  padding: 20px;
}

.error p { margin-bottom: 8px; }
.error small { color: #666; font-size: 12px; }

.image-display {
  display: none;
  width: 100%;
  max-width: 900px;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.img-frame {
  width: 100%;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-frame img {
  max-width: 100%;
  max-height: 65vh;
  object-fit: contain;
  display: block;
  border-radius: 4px;
}

.img-loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
}

.img-loading-overlay .spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #0f3460;
  border-top-color: #16c79a;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.img-error-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: #111;
  color: #444;
  font-size: 13px;
  flex-direction: column;
  gap: 8px;
}

.img-caption {
  font-size: 12px;
  color: #555;
  text-align: center;
  max-width: 600px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.controls {
  display: flex;
  align-items: center;
  gap: 16px;
}

.btn-nav {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #eee;
  font-size: 20px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  min-width: 56px;
}

.btn-nav:hover:not(:disabled) {
  border-color: #16c79a;
  color: #16c79a;
}

.btn-nav:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Touch swipe hint */
.swipe-hint {
  font-size: 11px;
  color: #333;
  text-align: center;
}

/* Progress bar */
.progress-bar {
  width: 100%;
  max-width: 900px;
  height: 2px;
  background: #0f3460;
  border-radius: 2px;
  overflow: hidden;
  display: none;
}

.progress-fill {
  height: 100%;
  background: #16c79a;
  transition: width 0.1s linear;
}

@media (max-width: 600px) {
  header { padding: 12px; gap: 8px; }
  h1 { font-size: 16px; }
  .search-bar input { font-size: 16px; } /* prevent iOS zoom */
  .btn-nav { padding: 10px 14px; font-size: 18px; }
  .img-frame img { max-height: 55vh; }
}
</style>
</head>
<body>

<header>
  <a href="../">← Atlas</a>
  <h1>Image Slideshow</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search images..." autocomplete="off" />
    <button id="searchBtn">Search</button>
  </div>
</header>

<div class="status-bar" id="statusBar">
  <span id="counterDisplay"></span>
  <label class="auto-toggle" title="Auto-advance every 5 seconds">
    <input type="checkbox" id="autoToggle" />
    Auto-advance
  </label>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="slideshow-area" id="slideshowArea">

  <div class="placeholder" id="placeholder">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="12" width="56" height="40" rx="4" stroke="#16c79a" stroke-width="2" fill="none"/>
      <circle cx="22" cy="26" r="5" stroke="#16c79a" stroke-width="2" fill="none"/>
      <path d="M4 44 L18 30 L28 40 L40 26 L60 44" stroke="#16c79a" stroke-width="2" fill="none" stroke-linejoin="round"/>
    </svg>
    <p>Enter a search term to load images</p>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Searching for images...</p>
  </div>

  <div class="error" id="errorBox">
    <p id="errorMsg">Something went wrong.</p>
    <small>DuckDuckGo may have blocked the request — try a different search or check your connection.</small>
  </div>

  <div class="image-display" id="imageDisplay">
    <div class="img-frame" id="imgFrame">
      <div class="img-loading-overlay" id="imgLoadingOverlay">
        <div class="spinner"></div>
      </div>
      <div class="img-error-overlay" id="imgErrorOverlay">
        <span>⚠️</span>
        <span>Image failed to load</span>
      </div>
      <img id="mainImg" src="" alt="" />
    </div>

    <div class="controls">
      <button class="btn-nav" id="prevBtn" title="Previous (←)">&#8592;</button>
      <button class="btn-nav" id="nextBtn" title="Next (→)">&#8594;</button>
    </div>

    <p class="img-caption" id="imgCaption"></p>
    <p class="swipe-hint" id="swipeHint">Swipe left/right to navigate</p>
  </div>

</div>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';

const $ = id => document.getElementById(id);

let images = [];
let current = 0;
let autoTimer = null;
let progressTimer = null;
let progressStart = null;
const AUTO_INTERVAL = 5000;

// Elements
const searchInput = $('searchInput');
const searchBtn = $('searchBtn');
const counterDisplay = $('counterDisplay');
const autoToggle = $('autoToggle');
const progressBar = $('progressBar');
const progressFill = $('progressFill');
const placeholder = $('placeholder');
const loading = $('loading');
const errorBox = $('errorBox');
const errorMsg = $('errorMsg');
const imageDisplay = $('imageDisplay');
const mainImg = $('mainImg');
const imgCaption = $('imgCaption');
const imgLoadingOverlay = $('imgLoadingOverlay');
const imgErrorOverlay = $('imgErrorOverlay');
const prevBtn = $('prevBtn');
const nextBtn = $('nextBtn');

function showState(state) {
  placeholder.style.display = state === 'placeholder' ? 'flex' : 'none';
  loading.style.display = state === 'loading' ? 'block' : 'none';
  errorBox.style.display = state === 'error' ? 'block' : 'none';
  imageDisplay.style.display = state === 'images' ? 'flex' : 'none';
  if (state !== 'images') counterDisplay.textContent = '';
}

function updateCounter() {
  if (!images.length) { counterDisplay.textContent = ''; return; }
  counterDisplay.textContent = `${current + 1} of ${images.length}`;
}

function updateNavButtons() {
  prevBtn.disabled = images.length <= 1;
  nextBtn.disabled = images.length <= 1;
}

function showImage(idx) {
  current = ((idx % images.length) + images.length) % images.length;
  const img = images[current];

  // Reset overlays
  imgLoadingOverlay.style.display = 'flex';
  imgErrorOverlay.style.display = 'none';
  mainImg.style.opacity = '0';

  mainImg.src = img.image;
  imgCaption.textContent = img.title || '';

  updateCounter();
  updateNavButtons();
}

mainImg.onload = () => {
  imgLoadingOverlay.style.display = 'none';
  imgErrorOverlay.style.display = 'none';
  mainImg.style.opacity = '1';
  mainImg.style.transition = 'opacity 0.3s';
};

mainImg.onerror = () => {
  imgLoadingOverlay.style.display = 'none';
  imgErrorOverlay.style.display = 'flex';
  mainImg.style.opacity = '0';
  // skip to next after a moment
  setTimeout(() => {
    if (images.length > 1) advance(1);
  }, 1200);
};

function advance(dir) {
  showImage(current + dir);
  if (autoToggle.checked) restartAutoTimer();
}

// Auto-advance
function startAutoTimer() {
  stopAutoTimer();
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';
  progressStart = Date.now();
  progressTimer = requestAnimationFrame(tickProgress);
  autoTimer = setTimeout(() => {
    advance(1);
  }, AUTO_INTERVAL);
}

function tickProgress() {
  const elapsed = Date.now() - progressStart;
  const pct = Math.min((elapsed / AUTO_INTERVAL) * 100, 100);
  progressFill.style.width = pct + '%';
  if (elapsed < AUTO_INTERVAL) {
    progressTimer = requestAnimationFrame(tickProgress);
  }
}

function stopAutoTimer() {
  clearTimeout(autoTimer);
  cancelAnimationFrame(progressTimer);
  progressBar.style.display = 'none';
  progressFill.style.width = '0%';
  autoTimer = null;
  progressTimer = null;
}

function restartAutoTimer() {
  if (autoToggle.checked) startAutoTimer();
}

autoToggle.addEventListener('change', () => {
  if (autoToggle.checked && images.length) startAutoTimer();
  else stopAutoTimer();
});

prevBtn.addEventListener('click', () => advance(-1));
nextBtn.addEventListener('click', () => advance(1));

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target === searchInput) return;
  if (e.key === 'ArrowLeft') advance(-1);
  if (e.key === 'ArrowRight') advance(1);
});

// Touch/swipe
let touchStartX = null;
imageDisplay.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

imageDisplay.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) advance(dx < 0 ? 1 : -1);
  touchStartX = null;
}, { passive: true });

// Fetch images via DuckDuckGo (proxied through allorigins to bypass CORS)
async function fetchImages(query) {
  showState('loading');
  stopAutoTimer();
  images = [];

  try {
    // Step 1: Get vqd token from DDG search page
    const tokenPageUrl = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&ia=images`;
    const tokenResp = await fetch(PROXY + encodeURIComponent(tokenPageUrl));
    if (!tokenResp.ok) throw new Error(`Proxy request failed (${tokenResp.status}) — check your connection`);
    const tokenData = await tokenResp.json();

    if (tokenData.status && tokenData.status.http_code >= 400) {
      throw new Error(`DuckDuckGo returned ${tokenData.status.http_code} — try again shortly`);
    }

    const html = tokenData.contents || '';
    if (!html) throw new Error('Empty response from proxy — DuckDuckGo may be unavailable');

    // Extract vqd token — try multiple patterns DuckDuckGo has used
    let vqd = null;
    for (const pattern of [
      /vqd=['"]([^'"]+)['"]/,
      /vqd=([0-9][0-9\-a-zA-Z_]*)/,
      /"vqd"\s*:\s*"([^"]+)"/,
      /data-vqd="([^"]+)"/,
    ]) {
      const m = html.match(pattern);
      if (m) { vqd = m[1]; break; }
    }
    if (!vqd) throw new Error('Could not find vqd token — DuckDuckGo may have changed their API');

    // Step 2: Fetch image results
    const apiEndpoint = `https://duckduckgo.com/i.js?q=${encodeURIComponent(query)}&vqd=${encodeURIComponent(vqd)}&o=json&l=us-en&p=1&s=0&u=bing&f=,,,`;
    const apiResp = await fetch(PROXY + encodeURIComponent(apiEndpoint));
    if (!apiResp.ok) throw new Error(`Image API request failed (${apiResp.status})`);
    const apiData = await apiResp.json();

    let parsed;
    try {
      parsed = JSON.parse(apiData.contents || '{}');
    } catch (_) {
      throw new Error('Failed to parse image results — unexpected response format');
    }

    const results = (parsed.results || []).filter(r => r && r.image);
    if (!results.length) throw new Error('No images found — try a different search term');

    images = results.slice(0, 50);
    current = 0;
    showState('images');
    showImage(0);

    if (autoToggle.checked) startAutoTimer();

  } catch (err) {
    console.error('Fetch error:', err);
    errorMsg.textContent = err.message || 'Failed to fetch images.';
    showState('error');
  }
}

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) { searchInput.focus(); return; }
  fetchImages(q);
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// Init
showState('placeholder');
</script>
</body>
</html>
