<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Builder MVP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0d1117;color:#c9d1d9;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;height:100vh;}
header{background:#161b22;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:1.5rem;color:#58a6ff;}
#budget{font-weight:bold;}
#main{flex:1;display:flex;overflow:hidden;}
#map{flex:2;background:#21262d;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);gap:1px;}
.tile{width:100%;height:0;padding-bottom:100%;position:relative;background:#30363d;cursor:pointer;}
.tile.fog{background:#0d1117;}
.tile.resource{background:#238636;}
.tile.building{background:#238636;filter:brightness(1.5);}
.tile span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.8rem;pointer-events:none;}
#sidebar{flex:1;background:#161b22;padding:10px;overflow:auto;}
section{margin-bottom:15px;}
button{background:#58a6ff;color:#0d1117;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.progress{background:#30363d;width:100%;height:10px;border-radius:5px;overflow:hidden;margin-top:5px;}
.progress div{height:100%;background:#58a6ff;}
</style>
</head>
<body>
<header>
  <h1>City Builder</h1>
  <div id="user-info">Budget: $<span id="budget">0</span> | Population: <span id="population">0</span> <button id="logout">Log Out</button></div>
</header>
<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <section id="auth-section">
      <h2>Login / Register</h2>
      <div id="error" style="color:#f85149;display:none;"></div>
      <input type="email" id="email" placeholder="Email" style="width:100%;margin-bottom:5px;" />
      <input type="password" id="password" placeholder="Password" style="width:100%;margin-bottom:5px;" />
      <button id="login-btn">Log In</button>
      <button id="register-btn">Register</button>
    </section>
    <section id="industry-section" style="display:none;">
      <h2>Select Industry</h2>
      <div id="industry-options"></div>
    </section>
    <section id="inventory" style="display:none;">
      <h2>Inventory</h2>
      <ul id="inv-list"></ul>
    </section>
    <section id="trade" style="display:none;">
      <h2>Trade Partners</h2>
      <div id="partners"></div>
    </section>
  </div>
</div>
<script>
// Supabase client
const supabase = supabase.createClient('https://igaulapupbtdcqqjobhs.supabase.co','sb_publishable_7yi3BNg-J-K5nralw5JSww_c71Pge6e');
let user = null;
let player = null;
const budgetEl = document.getElementById('budget');
const popEl = document.getElementById('population');

// UI refs
const authSection = document.getElementById('auth-section');
const industrySection = document.getElementById('industry-section');
const inventorySection = document.getElementById('inventory');
const tradeSection = document.getElementById('trade');
const mapEl = document.getElementById('map');
const errorEl = document.getElementById('error');

// Helpers
function showError(msg){errorEl.textContent = msg; errorEl.style.display='block';}
function clearError(){errorEl.style.display='none';}

async function init(){
  const { data: { session }, error } = await supabase.auth.getSession();
  if(session && session.user){
    user = session.user;
    await loadPlayer();
    showGameUI();
  } else {
    authSection.style.display='block';
  }
}

async function loadPlayer(){
  const { data, error } = await supabase.from('players').select('*').eq('id', user.id).single();
  if(error){
    // PGRST116 = no rows found when using .single()
    if(error.code === 'PGRST116'){
      const { error: insErr } = await supabase.from('players').insert({
        id: user.id,
        email: user.email,
        industry: null,
        budget: 500,
        population: 0
      });
      if(insErr){ console.error('Failed to create player:', insErr); return; }
      player = { id: user.id, email: user.email, industry: null, budget: 500, population: 0 };

      // Initialize inventory
      await supabase.from('inventory').insert({ player_id: user.id, resources: {} });

      // Initialize trade relationships
      const partners = ['river_traders','desert_caravan','mountain_folk','coastal_merchants'];
      for(const p of partners){
        await supabase.from('trade_relationships').insert({ player_id: user.id, partner: p, relationship: 50 });
      }
    } else {
      console.error('Error loading player:', error);
    }
  } else {
    player = data;
  }
}

function showGameUI(){
  authSection.style.display='none';
  document.getElementById('user-info').style.display='block';
  budgetEl.textContent = player.budget;
  popEl.textContent = player.population;
  if(!player.industry){
    showIndustrySelection();
  } else {
    startGame();
  }
}

function showIndustrySelection(){
  industrySection.style.display='block';
  const options = ['Clay','Timber','Stone','Iron','Corn'];
  const container = document.getElementById('industry-options');
  container.innerHTML='';
  options.forEach(ind => {
    const btn=document.createElement('button');
    btn.textContent=ind;
    btn.onclick=()=>selectIndustry(ind);
    container.appendChild(btn);
  });
}

async function selectIndustry(ind){
  const {error}=await supabase.from('players').update({industry:ind}).eq('id',user.id);
  if(error){showError('Failed to set industry');return;}
  player.industry=ind;
  industrySection.style.display='none';
  startGame();
}

async function startGame(){
  inventorySection.style.display='block';
  tradeSection.style.display='block';
  await generateMapIfNeeded();
  renderMap();
  loadInventory();
  loadPartners();
  // Game loop
  setInterval(gameTick,1000);
}

async function generateMapIfNeeded(){
  const {count, error} = await supabase.from('tiles').select('id', {count:'exact'});
  if(error) {console.error(error);return;}
  if(count===225) return; // already generated 15x15
  const resources=['clay','timber','stone','iron','corn'];
  const inserts=[];
  for(let y=0;y<15;y++){
    for(let x=0;x<15;x++){
      const res = Math.random()<0.3 ? resources[Math.floor(Math.random()*resources.length)] : null;
      inserts.push({x,y,resource:res,fog:true});
    }
  }
  const {error:insErr}=await supabase.from('tiles').insert(inserts);
  if(insErr) console.error(insErr);
}

async function renderMap(){
  const {data, error}=await supabase.from('tiles').select('*');
  if(error){console.error(error);return;}
  mapEl.innerHTML='';
  data.forEach(tile=>{
    const div=document.createElement('div');
    div.className='tile';
    if(tile.fog) div.classList.add('fog');
    if(tile.resource) div.classList.add('resource');
    if(tile.building_id) div.classList.add('building');
    div.dataset.x=tile.x; div.dataset.y=tile.y;
    if(tile.resource) div.innerHTML='<span>'+tile.resource[0].toUpperCase()+'</span>';
    div.onclick=()=>handleTileClick(tile);
    mapEl.appendChild(div);
  });
}

async function handleTileClick(tile){
  // reveal fog
  if(tile.fog){
    await supabase.from('tiles').update({fog:false}).eq('x',tile.x).eq('y',tile.y);
    tile.fog=false;
    renderMap();
    return;
  }
  // build extraction if eligible
  if(!tile.resource) return; // not a resource
  if(tile.building_id) return; // already built
  if(player.budget < 100) {showError('Insufficient funds');return;}
  // Create building
  const {data, error}=await supabase.from('buildings').insert({player_id:user.id,type:'extraction',tier:1,resource:tile.resource,tile_x:tile.x,tile_y:tile.y});
  if(error){showError('Build failed');return;}
  // deduct budget
  const newBudget = player.budget - 100;
  await supabase.from('players').update({budget:newBudget}).eq('id',user.id);
  player.budget = newBudget;
  budgetEl.textContent = newBudget;
  // link building to tile
  const buildingId = data[0].id;
  await supabase.from('tiles').update({building_id:buildingId}).eq('x',tile.x).eq('y',tile.y);
  renderMap();
}

async function gameTick(){
  // Process all buildings of this player
  const {data: buildings, error}=await supabase.from('buildings').select('*').eq('player_id',user.id);
  if(error){console.error(error);return;}
  for(const b of buildings){
    // Add resource to inventory
    const qty = 1; // simple production per tick
    const invRes = {};
    invRes[`resources->>${b.resource}`]=`(${b.resource})`;
    // We'll fetch inventory then update jsonb
    const {data: inv} = await supabase.from('inventory').select('resources').eq('player_id',user.id).single();
    let resources = inv ? inv.resources : {clay:0,timber:0,stone:0,iron:0,corn:0};
    resources[b.resource] = (resources[b.resource]||0)+qty;
    await supabase.from('inventory').upsert({player_id:user.id,resources});
    // increase population
    const newPop = player.population + 1;
    await supabase.from('players').update({population:newPop}).eq('id',user.id);
    player.population = newPop;
    popEl.textContent = newPop;
  }
  loadInventory();
  // Simple resource generation for all players? Skipped for MVP.
}

async function loadInventory(){
  const {data, error}=await supabase.from('inventory').select('resources').eq('player_id',user.id).single();
  const list=document.getElementById('inv-list');
  list.innerHTML='';
  const res = data ? data.resources : {clay:0,timber:0,stone:0,iron:0,corn:0};
  for(const [k,v] of Object.entries(res)){
    const li=document.createElement('li');
    li.textContent=`${k}: ${v}`;
    list.appendChild(li);
  }
}

function loadPartners(){
  const partners = ['River Traders','Desert Caravan','Mountain Folk','Coastal Merch'];
  const container=document.getElementById('partners');
  container.innerHTML='';
  partners.forEach(p=>{
    const div=document.createElement('div');
    div.style.marginBottom='10px';
    const name=document.createElement('div');name.textContent=p;div.appendChild(name);
    const prog=document.createElement('div');prog.className='progress';
    const bar=document.createElement('div');bar.style.width='50%';prog.appendChild(bar);
    div.appendChild(prog);
    const btn=document.createElement('button');btn.textContent='Gift $10';
    btn.onclick=async()=>{
      if(player.budget<10) return showError('Not enough money for gift');
      const newBud=player.budget-10;
      await supabase.from('players').update({budget:newBud}).eq('id',user.id);
      player.budget=newBud;budgetEl.textContent=newBud;
    };
    div.appendChild(btn);
    container.appendChild(div);
  });
}

// Auth handlers
document.getElementById('login-btn').onclick=async()=>{
  clearError();
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  const {error}=await supabase.auth.signInWithPassword({email,password:pass});
  if(error){showError(error.message);return;}
  const {data}=await supabase.auth.getSession();
  user=data.session.user;
  await loadPlayer();
  showGameUI();
};
document.getElementById('register-btn').onclick=async()=>{
  clearError();
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  const {error}=await supabase.auth.signUp({email,password:pass});
  if(error){showError(error.message);return;}
  // Auto login after sign‑up
  const {error:loginErr}=await supabase.auth.signInWithPassword({email,password:pass});
  if(loginErr){showError(loginErr.message);return;}
  const {data}=await supabase.auth.getSession();
  user=data.session.user;
  await loadPlayer();
  showGameUI();
};
document.getElementById('logout').onclick=async()=>{
  await supabase.auth.signOut();
  location.reload();
};

init();
</script>
</body>
</html>
