<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Counter Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 48px 64px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 32px;
    }

    .count {
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      margin-bottom: 32px;
      font-variant-numeric: tabular-nums;
    }

    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }

    button:hover { background: #2563eb; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #374151; color: #6b7280; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 24px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
    }

    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }
    .dot.loading {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Supabase Counter</h1>
    <div class="count" id="count">—</div>
    <button id="btn" disabled>Click me</button>
    <div class="status">
      <div class="dot loading" id="dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://igaulapupbtdcqqjobhs.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7yi3BNg-J-K5nralw5JSww_c71Pge6e';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const countEl = document.getElementById('count');
    const btn = document.getElementById('btn');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');

    function setStatus(state, text) {
      dot.className = 'dot ' + state;
      statusText.textContent = text;
    }

    async function loadCount() {
      const { data, error } = await supabase
        .from('counter')
        .select('count')
        .eq('id', 1)
        .single();

      if (error) {
        setStatus('error', 'Connection failed');
        countEl.textContent = '!';
        return;
      }

      countEl.textContent = data.count;
      btn.disabled = false;
      setStatus('connected', 'Connected');
    }

    async function increment() {
      btn.disabled = true;
      const current = parseInt(countEl.textContent) || 0;
      const next = current + 1;

      const { error } = await supabase
        .from('counter')
        .update({ count: next })
        .eq('id', 1);

      if (error) {
        setStatus('error', 'Save failed');
        btn.disabled = false;
        return;
      }

      countEl.textContent = next;
      btn.disabled = false;
      setStatus('connected', 'Saved');
    }

    btn.addEventListener('click', increment);
    loadCount();
  </script>
</body>
</html>
