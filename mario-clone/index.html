<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Mario Bros - World 1-1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 100%;
    max-width: 800px;
  }
  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #hud {
    background: #5c94fc;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 4px 8px;
    font-size: clamp(10px, 2.5vw, 16px);
    color: white;
    text-shadow: 2px 2px #000;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #hud span { min-width: 60px; text-align: center; }
  #message {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 20px 30px;
    text-align: center;
    border: 4px solid #fff;
    font-size: clamp(14px, 3vw, 22px);
    font-weight: bold;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }
  #message h2 { margin-bottom: 10px; }
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 8px 16px;
    gap: 16px;
    background: #000;
    width: 100%;
    max-width: 800px;
  }
  .btn-group { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    width: clamp(52px, 13vw, 76px);
    height: clamp(52px, 13vw, 76px);
    background: rgba(255,255,255,0.18);
    border: 3px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    color: white;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .ctrl-btn.pressed {
    background: rgba(255,255,255,0.45);
    border-color: #fff;
  }
  #jumpBtn {
    width: clamp(64px, 17vw, 92px);
    height: clamp(64px, 17vw, 92px);
    border-radius: 50%;
    background: rgba(220, 80, 50, 0.6);
    border-color: rgba(255,160,130,0.8);
    font-size: clamp(11px, 3vw, 16px);
    letter-spacing: 0;
  }
  #jumpBtn.pressed { background: rgba(255, 100, 70, 0.9); }
</style>
</head>
<body>
<div id="gameContainer">
  <div id="hud">
    <span>MARIO<br><span id="score">000000</span></span>
    <span>COIN <span id="coins">x00</span></span>
    <span>WORLD 1-1</span>
    <span>LIVES <span id="lives">3</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="message"><h2 id="msgTitle"></h2><p id="msgBody"></p></div>
</div>
<div id="controls">
  <div class="btn-group">
    <div class="ctrl-btn" id="leftBtn">&#9664;</div>
    <div class="ctrl-btn" id="rightBtn">&#9654;</div>
  </div>
  <div class="btn-group">
    <div class="ctrl-btn" id="jumpBtn">JUMP</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const TILE = 16;
  const VIEW_W = 256;
  const VIEW_H = 224;
  canvas.width = VIEW_W;
  canvas.height = VIEW_H;

  // Palette
  const C = {
    sky:        '#5c94fc',
    ground:     '#c84c0c',
    groundTop:  '#e86010',
    brick:      '#c84c0c',
    brickHi:    '#e8a050',
    pipe:       '#00a800',
    pipeLight:  '#00cc00',
    pipeDark:   '#006800',
    qBlock:     '#f8b800',
    qBlockDark: '#c87000',
    mario:      '#e40058',
    marioSkin:  '#fca044',
    marioBlue:  '#0058e4',
    goomba:     '#a05000',
    goombaDark: '#703800',
    flagPole:   '#888888',
    flagGreen:  '#00a800',
    coin:       '#f8b800',
    cloud:      '#ffffff',
    bush:       '#00a800',
  };

  // Input state
  const keys = { left: false, right: false };
  let jumpPressed  = false; // pulse: set on press, cleared by game loop each frame
  let jumpKeyDown  = false; // tracks physical key state to ignore key-repeat

  document.addEventListener('keydown', e => {
    if (['ArrowLeft','a','A'].includes(e.key))  keys.left  = true;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = true;
    if (['ArrowUp','w','W',' '].includes(e.key) && !jumpKeyDown) {
      jumpPressed = true; jumpKeyDown = true;
    }
    if (['r','R'].includes(e.key)) resetGame();
    e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    if (['ArrowLeft','a','A'].includes(e.key))  keys.left  = false;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = false;
    if (['ArrowUp','w','W',' '].includes(e.key)) jumpKeyDown = false;
  });

  function makeTouchBtn(id, key) {
    const btn = document.getElementById(id);
    const on  = e => { e.preventDefault(); keys[key] = true;  btn.classList.add('pressed'); };
    const off = e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); };
    btn.addEventListener('touchstart', on,  { passive: false });
    btn.addEventListener('touchend',   off, { passive: false });
    btn.addEventListener('touchcancel',off, { passive: false });
    btn.addEventListener('mousedown',  on);
    btn.addEventListener('mouseup',    off);
    btn.addEventListener('mouseleave', off);
  }
  makeTouchBtn('leftBtn',  'left');
  makeTouchBtn('rightBtn', 'right');

  // Jump button — set jumpPressed pulse on each press; touchend doesn't clear it
  // (the game loop consumes and clears jumpPressed each frame)
  const jBtn = document.getElementById('jumpBtn');
  const jOn  = e => { e.preventDefault(); jumpPressed = true; jBtn.classList.add('pressed'); };
  const jOff = e => { e.preventDefault(); jBtn.classList.remove('pressed'); };
  jBtn.addEventListener('touchstart', jOn,  { passive: false });
  jBtn.addEventListener('touchend',   jOff, { passive: false });
  jBtn.addEventListener('touchcancel',jOff, { passive: false });
  jBtn.addEventListener('mousedown',  jOn);
  jBtn.addEventListener('mouseup',    jOff);
  jBtn.addEventListener('mouseleave', jOff);

  // Restart on tap — only when on game-over/win screen, and not on control buttons
  document.addEventListener('touchstart', e => {
    if ((gameState === 'gameover' || gameState === 'winscreen') &&
        !e.target.closest('#controls')) {
      resetGame();
    }
  });

  // Tile types
  const T = { EMPTY:0, GROUND:1, BRICK:2, QBLOCK:3, PIPE_TOP:4, PIPE_BOT:5, USED:6, STAIR:7 };

  const MAP_W = 213;
  const MAP_H = 14;
  const GROUND_ROW = 12;

  let tileMap = [];

  function setTile(c, r, type) {
    if (r >= 0 && r < MAP_H && c >= 0 && c < MAP_W) tileMap[r][c] = type;
  }
  function getTile(c, r) {
    if (r < 0 || r >= MAP_H || c < 0 || c >= MAP_W) return T.EMPTY;
    return tileMap[r][c];
  }
  function isSolid(c, r) {
    const t = getTile(c, r);
    return t !== T.EMPTY;
  }

  // World 1-1 approximate layout
  function buildMap() {
    tileMap = Array.from({ length: MAP_H }, () => new Array(MAP_W).fill(T.EMPTY));

    // Ground rows 12-13 with two gaps
    for (let c = 0; c < MAP_W; c++) {
      const gap1 = c >= 100 && c <= 103;
      const gap2 = c >= 178 && c <= 182;
      if (!gap1 && !gap2) {
        setTile(c, 12, T.GROUND);
        setTile(c, 13, T.GROUND);
      }
    }

    // Q-blocks and bricks (row 8 = 4 tiles above ground row)
    setTile(16, 8, T.QBLOCK);
    setTile(21, 8, T.BRICK); setTile(22, 8, T.QBLOCK); setTile(23, 8, T.BRICK);
    setTile(22, 4, T.QBLOCK);
    setTile(38, 8, T.BRICK); setTile(39, 8, T.BRICK); setTile(40, 8, T.BRICK);
    setTile(41, 8, T.QBLOCK); setTile(42, 8, T.BRICK); setTile(43, 8, T.BRICK);
    setTile(41, 4, T.QBLOCK);
    setTile(57, 8, T.QBLOCK);
    setTile(64, 8, T.QBLOCK); setTile(65, 8, T.QBLOCK); setTile(64, 4, T.QBLOCK);
    setTile(78, 8, T.BRICK); setTile(79, 8, T.BRICK); setTile(80, 8, T.BRICK); setTile(81, 8, T.BRICK);
    setTile(107, 8, T.BRICK); setTile(108, 8, T.BRICK); setTile(109, 8, T.BRICK);
    setTile(110, 8, T.QBLOCK); setTile(111, 8, T.BRICK);

    // Pipes [col, height in tiles above ground]
    const pipes = [
      [28, 2], [38, 3], [46, 2], [55, 4], [163, 2]
    ];
    for (const [pc, ph] of pipes) {
      setTile(pc,   GROUND_ROW - ph,     T.PIPE_TOP);
      setTile(pc+1, GROUND_ROW - ph,     T.PIPE_TOP);
      for (let r = GROUND_ROW - ph + 1; r < GROUND_ROW; r++) {
        setTile(pc,   r, T.PIPE_BOT);
        setTile(pc+1, r, T.PIPE_BOT);
      }
    }

    // Staircase up (col 134-137)
    for (let i = 0; i < 4; i++) {
      for (let j = 0; j <= i; j++) {
        setTile(134 + i, GROUND_ROW - 1 - j, T.STAIR);
      }
    }
    // Staircase down (col 139-142)
    for (let i = 0; i < 4; i++) {
      for (let j = 0; j < 4-i; j++) {
        setTile(139 + i, GROUND_ROW - 1 - j, T.STAIR);
      }
    }

    // Final staircase (col 198-205)
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j <= i; j++) {
        setTile(198 + i, GROUND_ROW - 1 - j, T.STAIR);
      }
    }
  }

  // Game objects
  let score, coins, lives, gameState, camera, flagSlide, winTimer;

  const mario = { x:0, y:0, w:14, h:16, vx:0, vy:0, onGround:false, facingRight:true, animFrame:0, animTimer:0, invincible:0 };

  const GOOMBA_DEFS = [
    22, 36, 43, 62, 63, 90, 112, 113, 145, 168
  ].map(col => ({ cx: col }));

  let goombas = [];
  let coinFX = [];
  let brickFX = [];

  const GRAVITY   = 0.42;
  const JUMP_FORCE = -7.6;
  const WALK_SPD   = 1.8;
  const MAX_FALL   = 9;
  const FLAG_COL   = 206;
  const FLAG_X     = FLAG_COL * TILE;
  const FLAG_BASE  = GROUND_ROW * TILE;
  const FLAG_TOP   = 2 * TILE;

  function initGame() {
    buildMap();
    score = 0; coins = 0; lives = 3; camera = 0;
    gameState = 'playing';
    flagSlide = -1; winTimer = 0;
    jumpPressed = false; jumpKeyDown = false;

    mario.x = 48; mario.y = (GROUND_ROW - 2) * TILE;
    mario.vx = 0; mario.vy = 0;
    mario.onGround = false; mario.facingRight = true;
    mario.animFrame = 0; mario.invincible = 0;

    goombas = GOOMBA_DEFS.map(d => ({
      x: d.cx * TILE,
      y: (GROUND_ROW - 1) * TILE,
      w: 14, h: 14,
      vx: -1,
      alive: true,
      squished: false,
      squishTimer: 0,
    }));

    coinFX = [];
    brickFX = [];
    updateHUD();
  }

  function resetGame() { initGame(); }

  // Collision helpers
  function resolveObjX(obj) {
    const top = Math.floor(obj.y / TILE);
    const bot = Math.floor((obj.y + obj.h - 1) / TILE);
    if (obj.vx > 0) {
      const rc = Math.floor((obj.x + obj.w - 1) / TILE);
      for (let r = top; r <= bot; r++) {
        if (isSolid(rc, r)) { obj.x = rc * TILE - obj.w; obj.vx = 0; return true; }
      }
    } else if (obj.vx < 0) {
      const lc = Math.floor(obj.x / TILE);
      for (let r = top; r <= bot; r++) {
        if (isSolid(lc, r)) { obj.x = (lc + 1) * TILE; obj.vx = 0; return true; }
      }
    }
    return false;
  }

  function resolveObjY(obj, onHead) {
    const lc = Math.floor(obj.x / TILE);
    const rc = Math.floor((obj.x + obj.w - 1) / TILE);
    if (obj.vy > 0) {
      const br = Math.floor((obj.y + obj.h - 1) / TILE);
      for (let c = lc; c <= rc; c++) {
        if (isSolid(c, br)) {
          obj.y = br * TILE - obj.h;
          obj.vy = 0; obj.onGround = true; return;
        }
      }
    } else if (obj.vy < 0) {
      const tr = Math.floor(obj.y / TILE);
      for (let c = lc; c <= rc; c++) {
        if (isSolid(c, tr)) {
          obj.y = (tr + 1) * TILE;
          obj.vy = 0;
          if (onHead) onHead(c, tr);
          return;
        }
      }
    }
  }

  function hitBlock(col, row) {
    const t = getTile(col, row);
    if (t === T.QBLOCK) {
      setTile(col, row, T.USED);
      coins++; score += 200;
      coinFX.push({ x: col * TILE + TILE/2, y: row * TILE, vy: -5, life: 45 });
    } else if (t === T.BRICK) {
      setTile(col, row, T.EMPTY);
      score += 50;
      for (let i = 0; i < 6; i++) {
        brickFX.push({
          x: col * TILE + TILE/2, y: row * TILE + TILE/2,
          vx: (Math.random() - 0.5) * 4.5,
          vy: -3.5 - Math.random() * 3,
          life: 36
        });
      }
    }
  }

  function rectsOverlap(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function killMario() {
    lives--;
    mario.invincible = 150;
    mario.x = 48; mario.y = (GROUND_ROW - 2) * TILE;
    mario.vx = 0; mario.vy = 0;
    camera = 0;
    if (lives <= 0) gameState = 'gameover';
    updateHUD();
  }

  function updateHUD() {
    document.getElementById('score').textContent = String(score).padStart(6,'0');
    document.getElementById('coins').textContent = 'x' + String(coins).padStart(2,'0');
    document.getElementById('lives').textContent = lives;
    const msg = document.getElementById('message');
    if (gameState === 'gameover') {
      msg.style.display = 'block';
      document.getElementById('msgTitle').textContent = 'GAME OVER';
      document.getElementById('msgBody').textContent = 'Tap or press R to restart';
    } else if (gameState === 'winscreen') {
      msg.style.display = 'block';
      document.getElementById('msgTitle').textContent = 'YOU WIN!';
      document.getElementById('msgBody').textContent = 'Score: ' + score + '   Tap or R to play again';
    } else {
      msg.style.display = 'none';
    }
  }

  // ── Update ────────────────────────────────────────────────────────────────
  function update() {
    if (gameState === 'gameover' || gameState === 'winscreen') return;

    if (gameState === 'win') {
      winTimer++;
      // Slide Mario down flag pole
      if (flagSlide >= 0) {
        const poleH = FLAG_BASE - FLAG_TOP;
        mario.x = FLAG_X - 6;
        mario.y = FLAG_TOP + flagSlide * poleH;
        flagSlide = Math.min(1, flagSlide + 0.035);
        if (flagSlide >= 1) {
          mario.y = FLAG_BASE - mario.h;
          flagSlide = -2; // done sliding
        }
      }
      if (winTimer > 200) { gameState = 'winscreen'; updateHUD(); }
      return;
    }

    // ── Mario ────────────────────────────────────────────────────────────
    const wasOnGround = mario.onGround;
    mario.onGround = false;

    // Horizontal
    if (keys.left)  { mario.vx = -WALK_SPD; mario.facingRight = false; }
    else if (keys.right) { mario.vx =  WALK_SPD; mario.facingRight = true;  }
    else mario.vx *= 0.65;

    // Jump — jumpPressed is a pulse flag set by input, cleared here each frame
    if (jumpPressed && wasOnGround) mario.vy = JUMP_FORCE;
    jumpPressed = false;

    // Gravity
    mario.vy = Math.min(mario.vy + GRAVITY, MAX_FALL);

    mario.x += mario.vx;
    resolveObjX(mario);
    mario.y += mario.vy;
    resolveObjY(mario, (c, r) => hitBlock(c, r));

    // Clamp left
    if (mario.x < 0) { mario.x = 0; mario.vx = 0; }

    // Fall pit
    if (mario.y > VIEW_H + 40) { killMario(); return; }

    // Reach flag
    if (mario.x + mario.w >= FLAG_X && mario.x <= FLAG_X + 4 && flagSlide < 0) {
      flagSlide = 0;
      mario.vx = 0; mario.vy = 0;
      gameState = 'win'; winTimer = 0;
      score += 1000;
      updateHUD();
      return;
    }

    // Animation
    mario.animTimer++;
    if (mario.animTimer >= 7) { mario.animFrame = (mario.animFrame + 1) % 3; mario.animTimer = 0; }

    // Camera
    camera = mario.x - VIEW_W / 3;
    if (camera < 0) camera = 0;
    const maxCam = MAP_W * TILE - VIEW_W;
    if (camera > maxCam) camera = maxCam;

    // ── Goombas ──────────────────────────────────────────────────────────
    for (const g of goombas) {
      if (!g.alive) {
        if (g.squished) { g.squishTimer++; }
        continue;
      }

      g.x += g.vx;
      g.vy = (g.vy || 0) + GRAVITY;
      g.vy = Math.min(g.vy, MAX_FALL);
      g.y += g.vy;

      // Ground check
      const gc = Math.floor((g.x + g.w/2) / TILE);
      const gr = Math.floor((g.y + g.h) / TILE);
      if (isSolid(gc, gr)) {
        g.y = gr * TILE - g.h;
        g.vy = 0;
      }

      // Wall/edge bounce
      const gl = Math.floor(g.x / TILE);
      const grr = Math.floor((g.x + g.w) / TILE);
      const gmid = Math.floor((g.y + g.h/2) / TILE);
      if (isSolid(gl, gmid) || g.x < 0)         g.vx =  Math.abs(g.vx);
      if (isSolid(grr, gmid) || g.x+g.w >= MAP_W*TILE) g.vx = -Math.abs(g.vx);

      // Collide with Mario
      if (mario.invincible > 0) { mario.invincible--; continue; }
      if (rectsOverlap(mario, g)) {
        // Stomp from above
        if (mario.vy > 0 && mario.y + mario.h - 4 < g.y + g.h/2) {
          g.alive = false; g.squished = true; g.squishTimer = 0;
          mario.vy = -4.5;
          score += 100;
          updateHUD();
        } else {
          killMario();
          return;
        }
      }
    }
    if (mario.invincible > 0) mario.invincible--;

    // Coin FX
    for (const fx of coinFX) { fx.y += fx.vy; fx.vy += 0.35; fx.life--; }
    coinFX = coinFX.filter(f => f.life > 0);
    for (const fx of brickFX) { fx.x += fx.vx; fx.y += fx.vy; fx.vy += 0.35; fx.life--; }
    brickFX = brickFX.filter(f => f.life > 0);

    updateHUD();
  }

  // ── Draw helpers ──────────────────────────────────────────────────────────
  function px(wx) { return Math.round(wx - camera); }

  function drawCloud(wx, wy) {
    const x = px(wx);
    if (x < -48 || x > VIEW_W + 48) return;
    ctx.fillStyle = '#fff';
    ctx.fillRect(x,    wy+4, 16, 8);
    ctx.fillRect(x+4,  wy,   8,  4);
    ctx.fillRect(x+16, wy+4, 16, 8);
    ctx.fillRect(x+8,  wy+2, 20, 8);
    ctx.fillRect(x+4,  wy+4, 28, 10);
    ctx.fillRect(x+2,  wy+10, 32, 2);
  }

  function drawBush(wx, wy) {
    const x = px(wx);
    if (x < -48 || x > VIEW_W + 64) return;
    ctx.fillStyle = '#00a800';
    ctx.fillRect(x+4,  wy+4, 24, 8);
    ctx.fillRect(x,    wy,   32, 10);
    ctx.fillRect(x+4,  wy-4, 24, 6);
    ctx.fillRect(x+8,  wy-8, 16, 6);
    ctx.fillStyle = '#00cc00';
    ctx.fillRect(x+2, wy, 4, 4);
    ctx.fillRect(x+10, wy-4, 4, 4);
  }

  function drawTile(col, row, type) {
    const x = px(col * TILE);
    const y = row * TILE;
    if (x < -TILE || x > VIEW_W) return;

    switch (type) {
      case T.GROUND:
      case T.STAIR: {
        ctx.fillStyle = '#c84c0c';
        ctx.fillRect(x, y, TILE, TILE);
        if (row === GROUND_ROW || (type === T.STAIR && getTile(col, row-1) === T.EMPTY)) {
          ctx.fillStyle = '#e86010';
          ctx.fillRect(x, y, TILE, 3);
          ctx.fillStyle = '#ff9040';
          ctx.fillRect(x, y, 2, 2);
        }
        ctx.fillStyle = '#a03a00';
        for (let gx = 0; gx < TILE; gx += 8) ctx.fillRect(x+gx, y, 1, TILE);
        ctx.fillRect(x, y+8, TILE, 1);
        break;
      }
      case T.BRICK: {
        ctx.fillStyle = '#c84c0c';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#e8a050';
        ctx.fillRect(x, y, TILE, 2);
        ctx.fillRect(x, y, 2, TILE);
        ctx.fillStyle = '#a03000';
        ctx.fillRect(x+8, y, 1, TILE);
        ctx.fillRect(x, y+8, TILE, 1);
        break;
      }
      case T.QBLOCK: {
        ctx.fillStyle = '#f8b800';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
        ctx.fillStyle = '#f8b800';
        ctx.fillRect(x+4, y+3, 8, 10);
        ctx.fillRect(x+3, y+4, 10, 3);
        ctx.fillRect(x+5, y+9, 6, 2);
        ctx.fillStyle = '#c87000';
        ctx.fillRect(x, y+TILE-2, TILE, 2);
        ctx.fillRect(x+TILE-2, y, 2, TILE);
        ctx.fillStyle = '#fff8';
        ctx.fillRect(x, y, TILE, 1);
        break;
      }
      case T.USED: {
        ctx.fillStyle = '#888';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#666';
        ctx.fillRect(x+TILE-2, y, 2, TILE);
        ctx.fillRect(x, y+TILE-2, TILE, 2);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x, y, TILE, 1);
        ctx.fillRect(x, y, 1, TILE);
        break;
      }
      case T.PIPE_TOP: {
        // Left half top cap (col) right half shares
        const isLeft = (getTile(col+1, row) === T.PIPE_TOP);
        ctx.fillStyle = '#00cc00';
        if (isLeft) ctx.fillRect(x-2, y, TILE+2, TILE);
        else        ctx.fillRect(x, y, TILE+2, TILE);
        ctx.fillStyle = '#00a800';
        if (isLeft) ctx.fillRect(x, y+3, TILE-2, TILE-3);
        else        ctx.fillRect(x+2, y+3, TILE-2, TILE-3);
        ctx.fillStyle = '#006800';
        if (!isLeft) ctx.fillRect(x+TILE-2, y, 2, TILE);
        ctx.fillStyle = '#00ff0066';
        if (isLeft) ctx.fillRect(x, y+1, 3, TILE-2);
        break;
      }
      case T.PIPE_BOT: {
        const isLeft = (getTile(col+1, row) === T.PIPE_BOT);
        ctx.fillStyle = '#00a800';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#006800';
        if (!isLeft) ctx.fillRect(x+TILE-2, y, 2, TILE);
        ctx.fillStyle = '#00cc0066';
        if (isLeft) ctx.fillRect(x+2, y, 2, TILE);
        break;
      }
    }
  }

  function drawMario() {
    if (mario.invincible > 0 && Math.floor(mario.invincible / 5) % 2 === 1) return;
    const x = px(mario.x);
    const y = mario.y;
    const fr = mario.facingRight;

    ctx.save();
    if (!fr) {
      ctx.translate(x + mario.w, y);
      ctx.scale(-1, 1);
      drawMarioAt(0, 0);
    } else {
      ctx.translate(x, y);
      drawMarioAt(0, 0);
    }
    ctx.restore();
  }

  function drawMarioAt(x, y) {
    const f = mario.onGround ? mario.animFrame : 1;
    // Hat
    ctx.fillStyle = '#e40058'; ctx.fillRect(x+2, y,   12, 4);
    ctx.fillRect(x, y+4, TILE-2, 4);
    // Face
    ctx.fillStyle = '#fca044'; ctx.fillRect(x+2, y+4,  12, 6);
    // Eyes
    ctx.fillStyle = '#000';    ctx.fillRect(x+9, y+5, 3, 2);
    // Mustache
    ctx.fillStyle = '#6b3300'; ctx.fillRect(x+3, y+8, 9, 2);
    // Overalls
    ctx.fillStyle = '#0058e4'; ctx.fillRect(x, y+10, TILE, 6);
    ctx.fillStyle = '#e40058'; ctx.fillRect(x+2, y+10, 12, 3);
    // Suspenders
    ctx.fillStyle = '#e40058'; ctx.fillRect(x+3, y+10, 2, 6); ctx.fillRect(x+11, y+10, 2, 6);
    // Legs & shoes
    if (f === 0) {
      ctx.fillStyle = '#e40058'; ctx.fillRect(x+2, y+16, 5, 5); ctx.fillRect(x+9, y+16, 5, 5);
      ctx.fillStyle = '#3b1a00'; ctx.fillRect(x+1, y+20, 6, 3); ctx.fillRect(x+8, y+20, 6, 3);
    } else if (f === 1) {
      ctx.fillStyle = '#e40058'; ctx.fillRect(x+3, y+16, 5, 5); ctx.fillRect(x+8, y+16, 5, 5);
      ctx.fillStyle = '#3b1a00'; ctx.fillRect(x+2, y+20, 6, 3); ctx.fillRect(x+7, y+20, 6, 3);
    } else {
      ctx.fillStyle = '#e40058'; ctx.fillRect(x+1, y+16, 5, 6); ctx.fillRect(x+10, y+16, 5, 4);
      ctx.fillStyle = '#3b1a00'; ctx.fillRect(x, y+21, 7, 2); ctx.fillRect(x+9, y+19, 6, 3);
    }
  }

  function drawGoomba(g) {
    const x = px(g.x);
    if (x < -16 || x > VIEW_W + 16) return;
    const y = g.y;
    if (g.squished) {
      ctx.fillStyle = '#a05000';
      ctx.fillRect(x, y + g.h - 6, g.w, 6);
      ctx.fillStyle = '#703800';
      ctx.fillRect(x+2, y + g.h - 4, g.w-4, 4);
      return;
    }
    const wf = Math.floor(Date.now() / 200) % 2;
    // Body
    ctx.fillStyle = '#a05000'; ctx.fillRect(x+1, y+5, g.w-2, g.h-5);
    // Head
    ctx.fillStyle = '#703800'; ctx.fillRect(x+1, y, g.w-2, 7);
    ctx.fillRect(x, y+3, g.w, 4);
    // Eyes
    ctx.fillStyle = '#fff'; ctx.fillRect(x+1, y+2, 4, 3); ctx.fillRect(x+9, y+2, 4, 3);
    ctx.fillStyle = '#000'; ctx.fillRect(x+2, y+3, 2, 2); ctx.fillRect(x+10, y+3, 2, 2);
    // Angry brows
    ctx.fillStyle = '#000'; ctx.fillRect(x+1, y+1, 4, 1); ctx.fillRect(x+9, y+1, 4, 1);
    // Feet
    ctx.fillStyle = '#3b1a00';
    if (wf === 0) {
      ctx.fillRect(x-1, y+g.h-4, 6, 4); ctx.fillRect(x+9, y+g.h-2, 6, 2);
    } else {
      ctx.fillRect(x-1, y+g.h-2, 6, 2); ctx.fillRect(x+9, y+g.h-4, 6, 4);
    }
  }

  function drawFlag() {
    const x = px(FLAG_X);
    if (x < -8 || x > VIEW_W + 8) return;
    // Pole
    ctx.fillStyle = '#888';
    ctx.fillRect(x, FLAG_TOP, 3, FLAG_BASE - FLAG_TOP);
    // Ball
    ctx.fillStyle = '#f8b800';
    ctx.fillRect(x-2, FLAG_TOP-6, 7, 7);
    // Flag (disappears when grabbed)
    if (flagSlide < 0 || flagSlide === -2) {
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x+3, FLAG_TOP, 14, 12);
      ctx.fillStyle = '#00cc00';
      ctx.fillRect(x+3, FLAG_TOP, 14, 3);
      ctx.fillStyle = '#006800';
      ctx.fillRect(x+15, FLAG_TOP, 2, 12);
    }
  }

  function drawCastle() {
    const bx = px((MAP_W - 8) * TILE);
    if (bx > VIEW_W + 80 || bx < -80) return;
    const by = GROUND_ROW * TILE;
    const bh = 7 * TILE; const bw = 7 * TILE;
    ctx.fillStyle = '#888';
    ctx.fillRect(bx, by - bh, bw, bh);
    // Battlements
    for (let i = 0; i < 4; i++) {
      if (i % 2 === 0) ctx.fillRect(bx + i * (TILE-1), by - bh - TILE, TILE-1, TILE);
    }
    ctx.fillStyle = '#666';
    ctx.fillRect(bx+bw-3, by-bh, 3, bh);
    // Door
    ctx.fillStyle = '#000';
    ctx.fillRect(bx + bw/2 - 8, by - 2*TILE, 16, 2*TILE);
    ctx.fillRect(bx + bw/2 - 8, by - 3*TILE, 16, TILE);
    // Windows
    ctx.fillStyle = '#000';
    ctx.fillRect(bx+8, by-5*TILE, 8, 8);
    ctx.fillRect(bx+bw-16, by-5*TILE, 8, 8);
  }

  function drawFX() {
    for (const fx of coinFX) {
      const cx = px(fx.x);
      ctx.fillStyle = '#f8b800';
      ctx.fillRect(cx-3, fx.y, 6, 8);
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(cx-1, fx.y+1, 2, 5);
    }
    for (const fx of brickFX) {
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(px(fx.x)-3, fx.y-3, 6, 6);
      ctx.fillStyle = '#e8a050';
      ctx.fillRect(px(fx.x)-2, fx.y-2, 3, 3);
    }
  }

  // Decoration layout (world-space coords)
  const CLOUDS = [
    [2,2],[10,4],[21,2],[50,3],[70,2],[90,4],[120,2],[155,3],[185,2],[200,4]
  ].map(([c,r]) => [c*TILE, r*TILE]);
  const BUSHES = [
    [6,11],[24,11],[48,11],[80,11],[110,11],[160,11],[192,11]
  ].map(([c,r]) => [c*TILE, r*TILE]);

  function draw() {
    // Sky
    ctx.fillStyle = '#5c94fc';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // Clouds (slight parallax)
    for (const [wx, wy] of CLOUDS) {
      const camOffset = camera * 0.5;
      drawCloud(wx - camOffset, wy);
    }

    // Bushes
    for (const [wx, wy] of BUSHES) drawBush(wx, wy);

    // Castle
    drawCastle();

    // Flag
    drawFlag();

    // Tiles
    const sc = Math.max(0, Math.floor(camera / TILE) - 1);
    const ec = Math.min(MAP_W, sc + Math.ceil(VIEW_W / TILE) + 2);
    for (let r = 0; r < MAP_H; r++) {
      for (let c = sc; c <= ec; c++) {
        const t = tileMap[r][c];
        if (t !== T.EMPTY) drawTile(c, r, t);
      }
    }

    // FX
    drawFX();

    // Goombas
    for (const g of goombas) {
      if (g.alive || (g.squished && g.squishTimer < 35)) drawGoomba(g);
    }

    // Mario
    drawMario();

    // Win flash
    if (gameState === 'win' && winTimer < 80) {
      ctx.fillStyle = `rgba(255,255,200,${(winTimer/80)*0.25})`;
      ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    }
  }

  // ── Game loop ─────────────────────────────────────────────────────────────
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  initGame();
  loop();
})();
</script>
