<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clue Tracker</title>
  <style>
    :root {
      --bg:         #0d0d1a;
      --surface:    #1a1a2e;
      --surface2:   #13132a;
      --border:     #2a2a4a;
      --text:       #e8e8f0;
      --muted:      #666;
      --accent:     #e8c96d;
      --green:      #2ecc71;
      --green-bg:   #0d2a1a;
      --red:        #c0392b;
      --red-bg:     #2a0d0d;
      --gold:       #e8c96d;
      --gold-bg:    #2a1f06;
      --blue:       #3498db;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: var(--surface2);
      border-bottom: 2px solid var(--accent);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    header h1 {
      font-size: 20px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .save-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .save-dot.saving  { background: var(--accent); }
    .save-dot.saved   { background: var(--green); }

    .save-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .btn {
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      padding: 6px 14px;
      border: 1px solid;
      transition: background 0.15s;
    }

    .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      border-color: var(--red);
    }
    .btn-danger:hover { background: #3a1010; }

    /* ── Main layout ─────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .section-header {
      background: var(--surface2);
      padding: 10px 16px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header .count {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 1px;
    }

    /* ── Players section ─────────────────────────────── */
    .players-body {
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .player-chip.me { border-color: var(--accent); }

    .player-name-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      width: 90px;
      outline: none;
    }

    .player-chip.me .player-name-input { color: var(--accent); }

    .chip-remove {
      padding: 5px 10px 5px 2px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      background: none;
      border: none;
      font-family: inherit;
    }
    .chip-remove:hover { color: var(--red); }

    .btn-add-player {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      padding: 5px 14px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 20px;
      letter-spacing: 1px;
    }
    .btn-add-player:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Notebook table ──────────────────────────────── */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.notebook {
      width: 100%;
      border-collapse: collapse;
    }

    table.notebook thead th {
      background: var(--surface2);
      padding: 8px 6px;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-align: center;
    }

    table.notebook thead th.col-card {
      text-align: left;
      padding-left: 16px;
      min-width: 130px;
      position: sticky;
      left: 0;
      z-index: 10;
      background: var(--surface2);
    }

    table.notebook thead th.col-answer {
      color: var(--gold);
    }

    table.notebook thead th.col-me {
      color: var(--accent);
    }

    table.notebook tbody tr:last-child td { border-bottom: none; }

    table.notebook tbody td {
      border-bottom: 1px solid var(--border);
      padding: 4px 4px;
      text-align: center;
    }

    table.notebook tbody td.col-card {
      text-align: left;
      padding-left: 16px;
      font-size: 13px;
      white-space: nowrap;
      position: sticky;
      left: 0;
      z-index: 5;
      background: var(--surface);
      min-width: 130px;
    }

    /* Row states */
    table.notebook tbody tr.row-eliminated td.col-card {
      color: #444;
      text-decoration: line-through;
    }
    table.notebook tbody tr.row-answer td.col-card {
      color: var(--gold);
      font-weight: bold;
    }
    table.notebook tbody tr.row-eliminated td.col-card-bg {
      background: #111;
    }
    table.notebook tbody tr.row-answer td {
      background: #1a1500;
    }
    table.notebook tbody tr.row-answer td.col-card {
      background: #1a1500;
    }

    /* Cell buttons */
    .cell {
      width: 34px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: transparent;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      transition: all 0.1s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover { border-color: #555; }

    .cell.has {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }
    .cell.no {
      background: #1a1020;
      border-color: #333;
      color: #444;
    }
    .cell.answer {
      background: var(--gold-bg);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Deduction panel ─────────────────────────────── */
    .deduction-body {
      padding: 16px;
    }

    .deduction-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .deduction-row:last-child { margin-bottom: 0; }

    .deduction-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      min-width: 70px;
      padding-top: 5px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .deduction-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface2);
    }

    .tag.possible {
      color: var(--text);
      border-color: #3a3a5a;
    }

    .tag.answer {
      color: var(--gold);
      border-color: var(--gold);
      background: var(--gold-bg);
      font-weight: bold;
    }

    .tag.inferred {
      color: #7fb3d3;
      border-color: #2a4a6a;
      background: #0d1a2a;
    }

    .tag.none {
      color: var(--red);
      border-color: var(--red);
      background: var(--red-bg);
    }

    .solved-banner {
      background: var(--gold-bg);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 18px;
      text-align: center;
    }
    .solved-banner h3 {
      color: var(--gold);
      letter-spacing: 3px;
      font-size: 15px;
      margin-bottom: 8px;
    }
    .solved-banner p {
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Legend ──────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-cell {
      width: 20px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .legend-cell.has    { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .legend-cell.no     { background: #1a1020; border-color: #333; color: #444; }
    .legend-cell.answer { background: var(--gold-bg);  border-color: var(--gold);  color: var(--gold); }
    .legend-cell.empty  { background: transparent; border-color: var(--border); }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      header h1 { font-size: 15px; letter-spacing: 2px; }
      .save-label { display: none; }
      .btn { padding: 5px 10px; font-size: 10px; }
      table.notebook tbody td.col-card { font-size: 12px; min-width: 110px; }
      .cell { width: 30px; height: 26px; font-size: 12px; }
      .deduction-label { min-width: 60px; font-size: 9px; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#128269; Clue Tracker</h1>
  <div class="header-right">
    <div class="save-dot" id="saveDot"></div>
    <span class="save-label" id="saveLabel">AUTO-SAVE</span>
    <button class="btn btn-danger" id="clearBtn">CLEAR ALL</button>
  </div>
</header>

<main>

  <!-- Players -->
  <div class="section">
    <div class="section-header">Players</div>
    <div class="players-body" id="playersList"></div>
  </div>

  <!-- Suspects -->
  <div class="section">
    <div class="section-header">
      Suspects
      <span class="count" id="suspects-count"></span>
    </div>
    <div class="table-scroll">
      <table class="notebook" id="suspects-table"></table>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-cell empty"></div> Unknown</div>
      <div class="legend-item"><div class="legend-cell has">&#10003;</div> Has it</div>
      <div class="legend-item"><div class="legend-cell no">&#10007;</div> Doesn't have it</div>
      <div class="legend-item"><div class="legend-cell answer">&#9733;</div> Answer</div>
    </div>
  </div>

  <!-- Weapons -->
  <div class="section">
    <div class="section-header">
      Weapons
      <span class="count" id="weapons-count"></span>
    </div>
    <div class="table-scroll">
      <table class="notebook" id="weapons-table"></table>
    </div>
  </div>

  <!-- Rooms -->
  <div class="section">
    <div class="section-header">
      Rooms
      <span class="count" id="rooms-count"></span>
    </div>
    <div class="table-scroll">
      <table class="notebook" id="rooms-table"></table>
    </div>
  </div>

  <!-- Deduction -->
  <div class="section">
    <div class="section-header">Deduction</div>
    <div class="deduction-body" id="deductionPanel"></div>
  </div>

</main>

<footer>
  <a href="../">&#8592; Back to Atlas</a>
</footer>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const SUSPECTS = [
  'Miss Scarlet', 'Colonel Mustard', 'Mrs. White',
  'Mr. Green', 'Mrs. Peacock', 'Professor Plum'
];
const WEAPONS = [
  'Candlestick', 'Knife', 'Lead Pipe',
  'Revolver', 'Rope', 'Wrench'
];
const ROOMS = [
  'Kitchen', 'Ballroom', 'Conservatory',
  'Dining Room', 'Hall', 'Lounge',
  'Library', 'Study', 'Billiard Room'
];
const ALL_CARDS = [...SUSPECTS, ...WEAPONS, ...ROOMS];
const STORAGE_KEY = 'clue-tracker-v2';
const ANSWER_COL = '__answer__';

// ── State ────────────────────────────────────────────────────────────────────
// notebook[card][player] = 'has' | 'no' | 'answer' | (absent = 'unknown')
// players: string[]

let state;

function blankNotebook() {
  const nb = {};
  ALL_CARDS.forEach(c => nb[c] = {});
  return nb;
}

function defaultState() {
  return { players: ['You'], notebook: blankNotebook() };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && s.players && s.notebook) {
        // Fill in any missing cards (in case card list changed)
        ALL_CARDS.forEach(c => { if (!s.notebook[c]) s.notebook[c] = {}; });
        return s;
      }
    }
  } catch (e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  flashSave();
}

// ── Save indicator ───────────────────────────────────────────────────────────
let saveTimer;
function flashSave() {
  const dot = document.getElementById('saveDot');
  const lbl = document.getElementById('saveLabel');
  dot.className = 'save-dot saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    dot.className = 'save-dot saved';
    if (lbl) lbl.textContent = 'SAVED';
    setTimeout(() => {
      dot.className = 'save-dot';
      if (lbl) lbl.textContent = 'AUTO-SAVE';
    }, 1500);
  }, 200);
}

// ── Cell logic ───────────────────────────────────────────────────────────────
function getCell(card, player) {
  return state.notebook[card][player] || 'unknown';
}

function setCell(card, player, value) {
  if (value === 'unknown') {
    delete state.notebook[card][player];
  } else {
    state.notebook[card][player] = value;
  }
}

function cycleCell(card, player) {
  const cur = getCell(card, player);
  if (player === ANSWER_COL) {
    // answer col: unknown → answer → unknown
    if (cur === 'answer') {
      setCell(card, ANSWER_COL, 'unknown');
    } else {
      // Mark as answer; clear other answer in same category
      getCategoryCards(card).forEach(c => {
        if (c !== card) setCell(c, ANSWER_COL, 'unknown');
      });
      setCell(card, ANSWER_COL, 'answer');
      // If something was marked 'has' by anyone, clear conflicting answer
      // (allow coexistence — user may have made error, don't auto-clear player marks)
    }
  } else {
    // player col: unknown → has → no → unknown
    const next = cur === 'unknown' ? 'has' : cur === 'has' ? 'no' : 'unknown';
    setCell(card, player, next);
    // If now 'has', card can't be the answer — offer to clear answer mark?
    // We just silently allow it; deduction will flag the conflict.
  }
  saveState();
  render();
}

function getCategoryCards(card) {
  if (SUSPECTS.includes(card)) return SUSPECTS;
  if (WEAPONS.includes(card)) return WEAPONS;
  return ROOMS;
}

// ── Deduction ────────────────────────────────────────────────────────────────
// A card is "confirmed held" if any player (not __answer__) has it as 'has'
function isHeld(card) {
  return state.players.some(p => getCell(card, p) === 'has');
}

// A card is "confirmed answer"
function isAnswer(card) {
  return getCell(card, ANSWER_COL) === 'answer';
}

// Remaining possible answers in a category (not confirmed held, not conflicted)
function getPossibles(cards) {
  return cards.filter(c => !isHeld(c));
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function escAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function cellSymbol(status, isAnswerCol) {
  if (isAnswerCol) return status === 'answer' ? '&#9733;' : '';
  if (status === 'has') return '&#10003;';
  if (status === 'no')  return '&#10007;';
  return '';
}

function renderTable(tableId, cards, countId) {
  const table = document.getElementById(tableId);
  const allCols = [...state.players, ANSWER_COL];

  // Count still possible
  const possible = getPossibles(cards).filter(c => !isAnswer(c));
  const answered = cards.filter(isAnswer);
  const countEl = document.getElementById(countId);
  if (countEl) {
    if (answered.length) {
      countEl.textContent = `✓ ${answered[0]}`;
      countEl.style.color = 'var(--gold)';
    } else {
      countEl.textContent = `${possible.length} of ${cards.length} possible`;
      countEl.style.color = '';
    }
  }

  // Header
  let html = '<thead><tr>';
  html += '<th class="col-card">CARD</th>';
  state.players.forEach((p, i) => {
    const cls = i === 0 ? 'col-me' : '';
    const label = p.length > 9 ? p.slice(0, 8) + '&hellip;' : escAttr(p);
    html += `<th class="${cls}" title="${escAttr(p)}">${label}</th>`;
  });
  html += '<th class="col-answer">&#9733;</th>';
  html += '</tr></thead><tbody>';

  // Rows
  cards.forEach(card => {
    const held    = isHeld(card);
    const ans     = isAnswer(card);
    // Inferred answer: only remaining possible in category
    const possibles = getPossibles(getCategoryCards(card)).filter(c => !isAnswer(c));
    const inferred  = !held && !ans && possibles.length === 1 && possibles[0] === card;

    let rowCls = '';
    if (ans)    rowCls = 'row-answer';
    else if (held) rowCls = 'row-eliminated';

    html += `<tr class="${rowCls}">`;
    html += `<td class="col-card">${escAttr(card)}${inferred ? ' <span style="color:var(--blue);font-size:10px">&#8592;</span>' : ''}</td>`;

    state.players.forEach(player => {
      const status = getCell(card, player);
      const sym    = cellSymbol(status, false);
      html += `<td>
        <button class="cell ${status}"
          data-card="${escAttr(card)}"
          data-player="${escAttr(player)}"
          aria-label="${escAttr(player)}: ${status}">${sym}</button>
      </td>`;
    });

    // Answer column
    const ansStatus = getCell(card, ANSWER_COL);
    const ansSym    = cellSymbol(ansStatus, true);
    html += `<td>
      <button class="cell ${ansStatus}"
        data-card="${escAttr(card)}"
        data-player="${escAttr(ANSWER_COL)}"
        aria-label="Answer: ${ansStatus}">${ansSym}</button>
    </td>`;

    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

function renderPlayers() {
  const list = document.getElementById('playersList');
  let html = '';

  state.players.forEach((player, i) => {
    const isMe = i === 0;
    html += `<div class="player-chip${isMe ? ' me' : ''}">
      <input class="player-name-input"
        type="text"
        value="${escAttr(player)}"
        data-player-index="${i}"
        spellcheck="false"
        autocomplete="off"
        ${isMe ? 'placeholder="Your name"' : ''}>
      ${state.players.length > 1
        ? `<button class="chip-remove" data-remove-player="${i}" title="Remove player">&times;</button>`
        : ''}
    </div>`;
  });

  if (state.players.length < 6) {
    html += `<button class="btn-add-player" id="addPlayerBtn">+ Add Player</button>`;
  }

  list.innerHTML = html;
}

function renderDeduction() {
  const panel = document.getElementById('deductionPanel');

  function section(label, cards) {
    const answers   = cards.filter(isAnswer);
    const possible  = getPossibles(cards).filter(c => !isAnswer(c));
    const inferred  = !answers.length && possible.length === 1 ? possible[0] : null;

    let html = `<div class="deduction-row">`;
    html += `<div class="deduction-label">${label}</div>`;
    html += `<div class="deduction-tags">`;

    if (answers.length) {
      html += `<span class="tag answer">&#9733; ${escAttr(answers[0])}</span>`;
    } else if (inferred) {
      html += `<span class="tag inferred">&#8594; ${escAttr(inferred)}</span>`;
      html += `<span class="tag" style="font-size:10px;color:var(--muted)">only remaining</span>`;
    } else if (!possible.length) {
      html += `<span class="tag none">none? check your marks</span>`;
    } else {
      possible.forEach(c => {
        html += `<span class="tag possible">${escAttr(c)}</span>`;
      });
      const elim = cards.length - possible.length - answers.length;
      if (elim > 0) {
        html += `<span class="tag" style="font-size:10px">${elim} eliminated</span>`;
      }
    }

    html += `</div></div>`;
    return html;
  }

  // Check if fully solved
  const suspectAns = SUSPECTS.filter(isAnswer);
  const weaponAns  = WEAPONS.filter(isAnswer);
  const roomAns    = ROOMS.filter(isAnswer);

  // Also infer
  const sInfer = !suspectAns.length && getPossibles(SUSPECTS).filter(c => !isAnswer(c)).length === 1
    ? getPossibles(SUSPECTS).filter(c => !isAnswer(c))[0] : null;
  const wInfer = !weaponAns.length && getPossibles(WEAPONS).filter(c => !isAnswer(c)).length === 1
    ? getPossibles(WEAPONS).filter(c => !isAnswer(c))[0] : null;
  const rInfer = !roomAns.length && getPossibles(ROOMS).filter(c => !isAnswer(c)).length === 1
    ? getPossibles(ROOMS).filter(c => !isAnswer(c))[0] : null;

  const solved =
    (suspectAns.length === 1 || sInfer) &&
    (weaponAns.length  === 1 || wInfer) &&
    (roomAns.length    === 1 || rInfer);

  let html = '';

  if (solved) {
    const s = suspectAns[0] || sInfer;
    const w = weaponAns[0]  || wInfer;
    const r = roomAns[0]    || rInfer;
    html += `<div class="solved-banner">
      <h3>&#128269; CASE SOLVED</h3>
      <p>It was <strong>${escAttr(s)}</strong><br>
      in the <strong>${escAttr(r)}</strong><br>
      with the <strong>${escAttr(w)}</strong></p>
    </div>`;
  }

  html += section('SUSPECT', SUSPECTS);
  html += section('WEAPON',  WEAPONS);
  html += section('ROOM',    ROOMS);

  panel.innerHTML = html;
}

function render() {
  renderPlayers();
  renderTable('suspects-table', SUSPECTS, 'suspects-count');
  renderTable('weapons-table',  WEAPONS,  'weapons-count');
  renderTable('rooms-table',    ROOMS,    'rooms-count');
  renderDeduction();
}

// ── Player management ────────────────────────────────────────────────────────
function addPlayer() {
  const defaults = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank'];
  const taken = new Set(state.players);
  const name = defaults.find(n => !taken.has(n)) || `Player ${state.players.length + 1}`;
  state.players.push(name);
  saveState();
  render();
}

function removePlayer(index) {
  const name = state.players[index];
  state.players.splice(index, 1);
  ALL_CARDS.forEach(card => {
    delete state.notebook[card][name];
  });
  saveState();
  render();
}

function renamePlayer(index, newName) {
  const trimmed = newName.trim();
  if (!trimmed) return;
  const oldName = state.players[index];
  if (trimmed === oldName) return;
  state.players[index] = trimmed;
  ALL_CARDS.forEach(card => {
    if (oldName in state.notebook[card]) {
      state.notebook[card][trimmed] = state.notebook[card][oldName];
      delete state.notebook[card][oldName];
    }
  });
  saveState();
  render();
}

// ── Event handling ────────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  // Cell button
  const cell = e.target.closest('[data-card][data-player]');
  if (cell) {
    cycleCell(cell.dataset.card, cell.dataset.player);
    return;
  }
  // Add player
  if (e.target.id === 'addPlayerBtn') {
    addPlayer();
    return;
  }
  // Remove player
  const removeBtn = e.target.closest('[data-remove-player]');
  if (removeBtn) {
    removePlayer(parseInt(removeBtn.dataset.removePlayer));
    return;
  }
  // Clear all
  if (e.target.id === 'clearBtn') {
    if (confirm('Clear all tracking data and start fresh?')) {
      state = defaultState();
      saveState();
      render();
    }
    return;
  }
});

// Player rename on blur / enter
document.addEventListener('focusout', function(e) {
  if (e.target.matches('[data-player-index]')) {
    renamePlayer(parseInt(e.target.dataset.playerIndex), e.target.value);
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.matches('[data-player-index]')) {
    e.target.blur();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
state = loadState();
render();
</script>
</body>
</html>
