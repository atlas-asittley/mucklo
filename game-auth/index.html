<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Auth</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 10px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
}
h1 {
  font-size: 28px;
  color: #16c79a;
  margin-bottom: 6px;
  text-align: center;
}
.subtitle {
  color: #888;
  font-size: 13px;
  text-align: center;
  margin-bottom: 30px;
}
.form-group {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input {
  width: 100%;
  background: #0f3460;
  border: 1px solid #1a4a80;
  border-radius: 5px;
  padding: 10px 12px;
  color: #eee;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus {
  border-color: #16c79a;
}
.btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 5px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.btn-primary {
  background: #16c79a;
  color: #1a1a2e;
  margin-bottom: 10px;
}
.btn-primary:hover { background: #13a882; }
.btn-secondary {
  background: transparent;
  color: #16c79a;
  border: 1px solid #16c79a;
}
.btn-secondary:hover { background: rgba(22,199,154,0.1); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  background: rgba(233, 69, 96, 0.15);
  border: 1px solid #e94560;
  border-radius: 5px;
  color: #e94560;
  font-size: 12px;
  padding: 10px 12px;
  margin-bottom: 16px;
  display: none;
}
.success-msg {
  background: rgba(22, 199, 154, 0.15);
  border: 1px solid #16c79a;
  border-radius: 5px;
  color: #16c79a;
  font-size: 12px;
  padding: 10px 12px;
  margin-bottom: 16px;
  display: none;
}
.toggle-link {
  text-align: center;
  margin-top: 18px;
  font-size: 12px;
  color: #888;
}
.toggle-link a {
  color: #16c79a;
  cursor: pointer;
  text-decoration: underline;
}
/* Dashboard */
#dashboard { display: none; }
#auth-panel { display: block; }
.welcome {
  font-size: 22px;
  color: #16c79a;
  text-align: center;
  margin-bottom: 8px;
}
.welcome-sub {
  color: #aaa;
  font-size: 13px;
  text-align: center;
  margin-bottom: 30px;
}
.user-email {
  color: #eee;
  word-break: break-all;
}
.divider {
  border: none;
  border-top: 1px solid #0f3460;
  margin: 24px 0;
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #555;
  text-decoration: none;
}
.back-link:hover { color: #888; }
</style>
</head>
<body>

<div class="container">

  <!-- Auth Panel -->
  <div id="auth-panel">
    <h1 id="form-title">Welcome to the Game</h1>
    <p class="subtitle" id="form-subtitle">Sign in to continue your adventure</p>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="form-group" id="confirm-group" style="display:none;">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit()">Log In</button>
    <button class="btn btn-secondary" id="toggle-btn" onclick="toggleMode()">Register Instead</button>

    <div class="toggle-link" id="toggle-hint">
      No account? <a onclick="toggleMode()">Create one</a>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <p class="welcome">You're In!</p>
    <p class="welcome-sub">Logged in as <span class="user-email" id="user-email-display"></span></p>
    <hr class="divider">
    <button class="btn btn-primary" onclick="handleLogout()">Log Out</button>
  </div>

</div>

<a href="../" class="back-link">← Back to Atlas</a>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://igaulapupbtdcqqjobhs.supabase.co',
  'sb_publishable_7yi3BNg-J-K5nralw5JSww_c71Pge6e'
);

let isRegisterMode = false;

// Listen for auth state changes
sb.auth.onAuthStateChange((event, session) => {
  if (session && session.user) {
    showDashboard(session.user.email);
  } else {
    showAuthPanel();
  }
});

function showDashboard(email) {
  document.getElementById('auth-panel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-email-display').textContent = email;
}

function showAuthPanel() {
  document.getElementById('auth-panel').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  clearMessages();
}

function toggleMode() {
  isRegisterMode = !isRegisterMode;
  clearMessages();
  clearInputs();

  const confirmGroup = document.getElementById('confirm-group');
  const submitBtn = document.getElementById('submit-btn');
  const toggleBtn = document.getElementById('toggle-btn');
  const formTitle = document.getElementById('form-title');
  const formSubtitle = document.getElementById('form-subtitle');
  const toggleHint = document.getElementById('toggle-hint');

  if (isRegisterMode) {
    formTitle.textContent = 'Create Account';
    formSubtitle.textContent = 'Join the adventure';
    submitBtn.textContent = 'Register';
    toggleBtn.textContent = 'Log In Instead';
    confirmGroup.style.display = 'block';
    toggleHint.innerHTML = 'Already have an account? <a onclick="toggleMode()">Log in</a>';
    document.getElementById('password').autocomplete = 'new-password';
  } else {
    formTitle.textContent = 'Welcome to the Game';
    formSubtitle.textContent = 'Sign in to continue your adventure';
    submitBtn.textContent = 'Log In';
    toggleBtn.textContent = 'Register Instead';
    confirmGroup.style.display = 'none';
    toggleHint.innerHTML = 'No account? <a onclick="toggleMode()">Create one</a>';
    document.getElementById('password').autocomplete = 'current-password';
  }
}

async function handleSubmit() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const submitBtn = document.getElementById('submit-btn');

  clearMessages();

  if (!email || !password) {
    showError('Please fill in all fields.');
    return;
  }

  if (isRegisterMode) {
    const confirm = document.getElementById('confirm-password').value;
    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }
    if (password.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }
  }

  submitBtn.disabled = true;
  submitBtn.textContent = isRegisterMode ? 'Creating account...' : 'Signing in...';

  try {
    if (isRegisterMode) {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      showSuccess('Account created! Check your email to confirm, or log in if confirmation is disabled.');
      submitBtn.textContent = 'Register';
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      // onAuthStateChange will handle the redirect
    }
  } catch (err) {
    showError(friendlyError(err.message));
    submitBtn.textContent = isRegisterMode ? 'Register' : 'Log In';
  } finally {
    submitBtn.disabled = false;
  }
}

async function handleLogout() {
  const btn = document.querySelector('#dashboard .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Logging out...';
  await sb.auth.signOut();
  // onAuthStateChange handles the rest
}

function friendlyError(msg) {
  if (!msg) return 'Something went wrong. Please try again.';
  if (msg.includes('Invalid login credentials')) return 'Incorrect email or password.';
  if (msg.includes('Email not confirmed')) return 'Please confirm your email before logging in.';
  if (msg.includes('User already registered')) return 'An account with this email already exists.';
  if (msg.includes('Password should be')) return 'Password must be at least 6 characters.';
  if (msg.includes('Unable to validate email')) return 'Please enter a valid email address.';
  return msg;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function clearInputs() {
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
  document.getElementById('confirm-password').value = '';
}

// Submit on Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('auth-panel').style.display !== 'none') {
    handleSubmit();
  }
});
</script>

</body>
</html>
